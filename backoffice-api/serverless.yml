service: backoffice-api
frameworkVersion: '3'

plugins:
  - serverless-plugin-typescript
  - serverless-offline

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1

custom:
  serverless-offline:
    httpPort: 3000
    noPrependStageInUrl: true
    useInProcess: true

functions:
  getAll:
    handler: src/handlers/tickets-handler.handleGetAll
    events:
      - http:
          path: tickets
          method: get
