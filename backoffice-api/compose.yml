services:
  dynamodb:
    image: amazon/dynamodb-local
    user: root
    command: -jar DynamoDBLocal.jar -dbPath /data -sharedDb
    ports:
      - '8000:8000'
    volumes:
      - dynamodb_data:/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "exec 3<>/dev/tcp/localhost/8000 && echo -e 'GET / HTTP/1.0\r\n\r\n' >&3 && cat <&3 | grep -q HTTP",
        ]
      interval: 2s
      timeout: 3s
      retries: 10

  dynamodb-setup:
    image: amazon/aws-cli
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: sa-east-1
    entrypoint:
      - /bin/sh
      - -c
      - |
        aws dynamodb create-table \
          --endpoint-url http://dynamodb:8000 \
          --table-name backoffice-api-local-tickets \
          --attribute-definitions \
            AttributeName=id,AttributeType=S \
            AttributeName=createdBy,AttributeType=S \
            AttributeName=createdAt,AttributeType=S \
            AttributeName=status,AttributeType=S \
          --key-schema AttributeName=id,KeyType=HASH \
          --global-secondary-indexes \
            "IndexName=createdBy-createdAt-index,KeySchema=[{AttributeName=createdBy,KeyType=HASH},{AttributeName=createdAt,KeyType=RANGE}],Projection={ProjectionType=ALL}" \
            "IndexName=status-createdAt-index,KeySchema=[{AttributeName=status,KeyType=HASH},{AttributeName=createdAt,KeyType=RANGE}],Projection={ProjectionType=ALL}" \
          --billing-mode PAY_PER_REQUEST \
          --output text || true
    depends_on:
      dynamodb:
        condition: service_healthy

  api:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules # shadow host node_modules to prevent platform binary conflicts (e.g. esbuild linux vs darwin)
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      DYNAMODB_ENDPOINT: http://dynamodb:8000
      CHOKIDAR_USEPOLLING: 1
      CHOKIDAR_INTERVAL: 500
    command: sh -c "npm install --prefer-offline && npx nodemon"
    depends_on:
      dynamodb-setup:
        condition: service_completed_successfully

volumes:
  dynamodb_data:
